# Charis G Platform — Nginx 리버스 프록시 (t3.micro 정적 빌드 모드)
#
# 단일 도메인. 프론트는 apps/*/dist 정적 서빙. 백엔드만 uvicorn 프록시.
#
# 라우팅:
#   /                  → apps/hub/dist          (Shell App)
#   /dropshipping/*    → apps/dropshipping/dist (DS App)
#   /purchase/*        → apps/purchase/dist     (PA App)
#   /api/hub/*         → 127.0.0.1:8000         (Hub API)
#   /api/ds/*          → 127.0.0.1:8001         (DS API)
#   /api/pa/*          → 127.0.0.1:8002         (PA API)
#
# 사용자가 직접 수정해야 하는 부분: server_name, root 절대경로
# 배포 시: /etc/nginx/sites-available/ 에 심볼릭 링크 + sudo nginx -t

upstream charisg_hub_api { server 127.0.0.1:8000; }
upstream charisg_ds_api  { server 127.0.0.1:8001; }
upstream charisg_pa_api  { server 127.0.0.1:8002; }

# 공용 프록시 헤더
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_buffering off;
proxy_read_timeout 120s;

server {
    listen 80 default_server;
    server_name _;          # certbot --nginx 적용 시 도메인으로 교체

    client_max_body_size 50M;

    # ───────── API 라우팅 ─────────
    location /api/hub/ {
        proxy_pass http://charisg_hub_api;
    }
    location /api/ds/ {
        proxy_pass http://charisg_ds_api;
    }
    location /api/pa/ {
        proxy_pass http://charisg_pa_api;
    }

    # ───────── DS App (정적) ─────────
    location /dropshipping/ {
        alias /home/ubuntu/CharisG-Platform/charisg-platform/apps/dropshipping/dist/;
        try_files $uri $uri/ /dropshipping/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ───────── PA App (정적) ─────────
    location /purchase/ {
        alias /home/ubuntu/CharisG-Platform/charisg-platform/apps/purchase/dist/;
        try_files $uri $uri/ /purchase/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ───────── Shell App (default, 정적) ─────────
    location / {
        root /home/ubuntu/CharisG-Platform/charisg-platform/apps/hub/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
