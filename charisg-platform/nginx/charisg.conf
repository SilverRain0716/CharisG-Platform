# Charis G Platform — Nginx 리버스 프록시
# 단일 도메인, 단일 SSL.
#
# 라우팅:
#   /             → Shell App  (port 3000)
#   /dropshipping → DS App     (port 3001)
#   /purchase     → PA App     (port 3002)
#   /api/hub      → Hub API    (port 8000)
#   /api/ds       → DS API     (port 8001)
#   /api/pa       → PA API     (port 8002)
#
# SSL은 certbot --nginx 로 자동 추가 (Phase 4).

upstream charisg_shell { server 127.0.0.1:3000; }
upstream charisg_ds_app { server 127.0.0.1:3001; }
upstream charisg_pa_app { server 127.0.0.1:3002; }

upstream charisg_hub_api { server 127.0.0.1:8000; }
upstream charisg_ds_api  { server 127.0.0.1:8001; }
upstream charisg_pa_api  { server 127.0.0.1:8002; }

# 공용 프록시 헤더 (3개 앱 공통)
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
proxy_buffering off;
proxy_read_timeout 120s;

server {
    listen 80;
    server_name _;          # certbot --nginx 적용 시 도메인으로 교체

    client_max_body_size 50M;

    # ───────── API 라우팅 ─────────
    location /api/hub/ {
        proxy_pass http://charisg_hub_api;
    }
    location /api/ds/ {
        proxy_pass http://charisg_ds_api;
    }
    location /api/pa/ {
        proxy_pass http://charisg_pa_api;
    }

    # ───────── App 라우팅 ─────────
    location /dropshipping/ {
        proxy_pass http://charisg_ds_app/;
    }
    location /purchase/ {
        proxy_pass http://charisg_pa_app/;
    }

    # ───────── Shell (default) ─────────
    location / {
        proxy_pass http://charisg_shell;
    }
}
